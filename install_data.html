function log(msg, cls) {
  var el = document.getElementById('log');
  el.innerHTML += '<span class="' + (cls||'') + '">' + msg + '</span>\n';
  el.scrollTop = el.scrollHeight;
}

async function installAndSync() {
  document.getElementById('log').innerHTML = '';
  log('=== КРОК 1: ВСТАНОВЛЕННЯ В localStorage ===', 'info');
  
  try {
    // Save all data
    Object.keys(DATA).forEach(function(k) {
      localStorage.setItem(k, DATA[k]);
      log('✓ ' + k + ' збережено (' + DATA[k].length + ' байт)', 'ok');
    });
    
    // Verify logs have exerciseIds
    var logs = JSON.parse(DATA.wt_logs);
    Object.keys(logs).forEach(function(date) {
      var log_entry = logs[date];
      var idKeys = Object.keys(log_entry.sets || {}).filter(function(k){return isNaN(k);});
      log('  ' + date + ': exerciseIds=' + JSON.stringify(log_entry.exerciseIds) + ', idKeys=' + idKeys.length, 'ok');
    });
    
    log('\n=== КРОК 2: ЗБЕРЕГТИ В ХМАРУ ===', 'info');
    
    // Get GitHub credentials
    var token = localStorage.getItem('gh_token');
    var owner = localStorage.getItem('gh_owner');
    var repo = localStorage.getItem('gh_repo');
    
    if (!token || !owner || !repo) {
      log('❌ Немає GitHub credentials!', 'err');
      log('Введи токен, owner і repo в полях нижче:', 'info');
      document.getElementById('creds').style.display = 'block';
      return;
    }
    
    log('GitHub: ' + owner + '/' + repo, 'info');
    await saveToCloud(token, owner, repo);
    
  } catch(e) {
    log('ПОМИЛКА: ' + e.message, 'err');
    console.error(e);
  }
}

async function saveToCloud(token, owner, repo) {
  var SYNC_KEYS = ['wt_plan','wt_logs','wt_videos','wt_weightlog','wt_goals','wt_hints_log','wt_steps','wt_sync_ts'];
  var saveData = {};
  SYNC_KEYS.forEach(function(k) {
    var v = localStorage.getItem(k);
    if (v) saveData[k] = v;
  });
  
  // Set sync timestamp
  var ts = Date.now();
  localStorage.setItem('wt_sync_ts', JSON.stringify(ts));
  saveData['wt_sync_ts'] = JSON.stringify(ts);
  
  var content = btoa(unescape(encodeURIComponent(JSON.stringify(saveData, null, 2))));
  var url = 'https://api.github.com/repos/' + owner + '/' + repo + '/contents/data.json';
  var hdrs = {'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github+json', 'X-GitHub-Api-Version': '2022-11-28', 'Content-Type': 'application/json'};
  
  // Get SHA
  var sha = null;
  try {
    var r = await fetch(url, {headers: hdrs});
    if (r.ok) { var j = await r.json(); sha = j.sha; }
  } catch(e) {}
  
  var body = {message: 'migrate exercise IDs', content: content};
  if (sha) body.sha = sha;
  
  var res = await fetch(url, {method: 'PUT', headers: hdrs, body: JSON.stringify(body)});
  
  if (res.ok) {
    var saved = await res.json();
    var newSha = saved.content && saved.content.sha;
    if (newSha) localStorage.setItem('wt_cloud_sha', newSha);
    log('✅ Збережено в хмару! SHA: ' + newSha, 'ok');
    log('\nТепер натисни "Відкрити додаток"', 'info');
  } else {
    var err = await res.json().catch(function(){return {}});
    log('❌ Помилка хмари: ' + res.status + ' ' + (err.message||''), 'err');
  }
}

function goApp() {
  window.location.href = '/gym_app/';
}
