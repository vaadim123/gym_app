// GitHub Sync
async function ghSave(token,owner,repo){
  var data={};
  SYNC_KEYS.forEach(function(k){var v=localStorage.getItem(k);if(v)data[k]=v;});
  var content=btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))));
  var hdrs={'Authorization':'Bearer '+token,'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28','Content-Type':'application/json'};
  var url='https://api.github.com/repos/'+owner+'/'+repo+'/contents/data.json';
  var sha=null;
  try{var r=await fetch(url,{headers:hdrs});if(r.ok){var j=await r.json();sha=j.sha;}else if(r.status!==404){var ej=await r.json().catch(function(){return{};});return{ok:false,msg:'GET помилка '+r.status+': '+(ej.message||'')};}}catch(e){}
  var body={message:'sync workout data',content:content};
  if(sha)body.sha=sha;
  var res=await fetch(url,{method:'PUT',headers:hdrs,body:JSON.stringify(body)});
  if(!res.ok){var eb=await res.json().catch(function(){return{};});return{ok:false,msg:'Помилка '+res.status+': '+(eb.message||'невідома')};}
  return{ok:true,msg:'✓ Збережено в GitHub!'};
}
async function ghLoad(token,owner,repo){
  var url='https://api.github.com/repos/'+owner+'/'+repo+'/contents/data.json';
  var r=await fetch(url,{headers:{'Authorization':'Bearer '+token,'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'}});
  if(!r.ok){if(r.status===404)return{ok:false,msg:'Файл не знайдено. Спочатку збережи дані.'};var e=await r.json().catch(function(){return{};});return{ok:false,msg:'Помилка '+r.status+': '+(e.message||'')};}
  var j=await r.json();
  var data=JSON.parse(decodeURIComponent(escape(atob(j.content.replace(/\n/g,'')))));
  SYNC_KEYS.forEach(function(k){if(data[k])localStorage.setItem(k,data[k]);});
  return{ok:true,msg:'✓ Завантажено! Перезавантаж сторінку.'};
}
