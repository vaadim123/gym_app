<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Workout</title>

<style>
body {
  margin:0;
  background:#0a0a0f;
  color:#fff;
  font-family:monospace;
}
button,input {
  font-family:inherit;
}
</style>

</head>
<body>

<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<script>

const {useState, useEffect} = React;

const DEFAULT_PLAN = {
  A: {
    name: "Груди + Трицепс",
    emoji: "💪",
    exercises: [
      {name:"Жим лежачи", sets:4, reps:"8-10"},
      {name:"Гантелі під кутом", sets:3, reps:"10-12"},
    ]
  }
};

function App(){

  const [plan,setPlan] = useState(()=>{
    try{
      return JSON.parse(localStorage.getItem("wt_plan")) || DEFAULT_PLAN;
    }catch{
      return DEFAULT_PLAN;
    }
  });

  const [logs,setLogs] = useState(()=>{
    try{
      return JSON.parse(localStorage.getItem("wt_logs")) || {};
    }catch{
      return {};
    }
  });

  const [today,setToday] = useState("A");

  useEffect(()=>{
    localStorage.setItem("wt_plan", JSON.stringify(plan));
  },[plan]);

  useEffect(()=>{
    localStorage.setItem("wt_logs", JSON.stringify(logs));
  },[logs]);

  function logSet(exIndex, setIndex, data){
    const key = new Date().toISOString().split("T")[0];

    setLogs(prev=>{
      const copy = {...prev};

      if(!copy[key]){
        copy[key] = {sets:{}};
      }

      copy[key].sets[`${exIndex}_${setIndex}`] = data;

      return copy;
    });
  }

  return (
    React.createElement("div",{style:{padding:20}},
      React.createElement("h2",null,"Workout"),

      plan[today].exercises.map((ex,exIndex)=>
        React.createElement("div",{key:exIndex, style:{marginBottom:20}},
          
          React.createElement("div",null,ex.name),

          Array.from({length:ex.sets}).map((_,setIndex)=>
            React.createElement("div",{key:setIndex},

              React.createElement("input",{
                placeholder:"кг",
                onChange:e=>logSet(exIndex,setIndex,{
                  weight:e.target.value
                })
              }),

              React.createElement("input",{
                placeholder:"повт",
                onChange:e=>logSet(exIndex,setIndex,{
                  reps:e.target.value
                })
              })

            )
          )
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root"))
.render(React.createElement(App));

</script>

</body>
</html>
