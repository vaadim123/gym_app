// DEBUG: показати що в localStorage
function showDebug() {
  const keys = ['wt_logs', 'wt_current', 'wt_hints_log', 'wt_goals'];
  let msg = '';
  keys.forEach(k => {
    const v = localStorage.getItem(k);
    if (v) {
      try {
        const parsed = JSON.parse(v);
        if (k === 'wt_logs') {
          msg += 'wt_logs keys: ' + Object.keys(parsed).join(', ') + '\n';
          Object.entries(parsed).forEach(([date, log]) => {
            const sets = log.sets || {};
            const totalDone = Object.values(sets).flat().filter(s => s && s.done).length;
            msg += '  ' + date + ' dayType=' + log.dayType + ' doneSets=' + totalDone + '\n';
            // Show first exercise sets
            if (sets[0]) {
              msg += '  sets[0]: ' + JSON.stringify(sets[0]).slice(0,100) + '\n';
            }
          });
        } else if (k === 'wt_current') {
          const sets = parsed.sets || {};
          const filled = Object.entries(sets).filter(([,v]) => v.weight || v.reps || v.done).length;
          msg += 'wt_current: date=' + parsed.date + ' day=' + parsed.day + ' filledSets=' + filled + '\n';
          // Show sample
          const sample = Object.entries(sets).slice(0,3);
          sample.forEach(([k,v]) => { msg += '  ' + k + ': ' + JSON.stringify(v) + '\n'; });
        } else {
          msg += k + ': ' + JSON.stringify(parsed).slice(0, 100) + '\n';
        }
      } catch(e) { msg += k + ': parse error\n'; }
    } else {
      msg += k + ': (empty)\n';
    }
  });
  alert(msg || 'localStorage порожній');
}

// ─── WEIGHT CHART ─────────────────────────────────────────────────────────────
function WeightChart({ weightLog, days }) {
  const entries = Object.entries(weightLog).sort(([a], [b]) => a.localeCompare(b));
  const shown = days ? entries.slice(-days) : entries;
  if (shown.length < 2) return (
    <div style={{ textAlign: 'center', color: C.muted, padding: '20px 0', fontSize: 12 }}>
      Потрібно мінімум 2 записи
    </div>
  );
  const vals = shown.map(([, v]) => parseFloat(v));
  const min = Math.min(...vals) - 0.5;
  const max = Math.max(...vals) + 0.5;
  const cx = (i) => 8 + i / (shown.length - 1) * 284;
  const cy = (v) => 102 - (v - min) / (max - min) * 94;
  const points = shown.map(([, v], i) => `${cx(i)},${cy(parseFloat(v))}`).join(' ');
  const area = `M${cx(0)},110 ` + shown.map(([, v], i) => `L${cx(i)},${cy(parseFloat(v))}`).join(' ') + ` L${cx(shown.length - 1)},110 Z`;
  return (
    <div style={{ overflowX: 'auto' }}>
      <svg width={300} height={110} style={{ display: 'block', margin: '0 auto' }}>
        <defs>
          <linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={C.orange} stopOpacity="0.3" />
            <stop offset="100%" stopColor={C.orange} stopOpacity="0" />
          </linearGradient>
        </defs>
        {[0, 0.25, 0.5, 0.75, 1].map(t => (
          <line key={t} x1={8} y1={8 + 94 * (1 - t)} x2={292} y2={8 + 94 * (1 - t)} stroke={C.border} strokeWidth="1" strokeDasharray="3,3" />
        ))}
        <path d={area} fill="url(#wg)" />
        <polyline points={points} fill="none" stroke={C.orange} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
        {shown.map(([, v], i) => (
          <circle key={i} cx={cx(i)} cy={cy(parseFloat(v))} r="3" fill={C.orange} stroke={C.bg} strokeWidth="1.5" />
        ))}
        <text x={cx(0)} y={cy(vals[0]) - 7} textAnchor="middle" fontSize="9" fill={C.orangeL}>{vals[0]}</text>
        <text x={cx(shown.length - 1)} y={cy(vals[vals.length - 1]) - 7} textAnchor="middle" fontSize="9" fill={C.orangeL}>{vals[vals.length - 1]}</text>
      </svg>
      <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 9, color: C.muted, padding: '4px 8px 0' }}>
        <span>{shown[0][0]}</span>
        <span>{shown[shown.length - 1][0]}</span>
      </div>
    </div>
  );
}

// ─── EDIT PLAN MODAL ──────────────────────────────────────────────────────────
function EditPlanModal({ planKey, plan, onSave, onClose }) {
  const [name, setName] = useState(plan.name);
  const [emoji, setEmoji] = useState(plan.emoji);
  const [exercises, setExercises] = useState(plan.exercises.map(e => ({ ...e })));

  const updateEx = (i, field, val) => setExercises(exs => exs.map((e, j) => j === i ? { ...e, [field]: val } : e));
  const moveEx = (i, dir) => {
    const arr = [...exercises];
    const j = i + dir;
    if (j < 0 || j >= arr.length) return;
    [arr[i], arr[j]] = [arr[j], arr[i]];
    setExercises(arr);
  };

  return (
    <div style={{ position: 'fixed', inset: 0, zIndex: 100, background: 'rgba(0,0,0,0.95)', overflowY: 'auto' }}>
      <div style={{ background: C.bg, minHeight: '100%', padding: 16, paddingBottom: 40 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
          <div style={{ fontSize: 16, fontWeight: 700, color: C.text }}>✏️ Редагувати день {planKey}</div>
          <button onClick={onClose} style={{ background: 'none', border: 'none', color: C.muted, fontSize: 22, cursor: 'pointer' }}>✕</button>
        </div>
        <div style={{ background: C.card, borderRadius: 12, padding: 14, marginBottom: 16, border: `1px solid ${C.border}` }}>
          <div style={{ fontSize: 11, color: C.muted, marginBottom: 6, letterSpacing: 1 }}>НАЗВА ДНЯ</div>
          <input value={name} onChange={e => setName(e.target.value)} style={{ width: '100%', background: C.inner, border: `1px solid ${C.border}`, borderRadius: 8, color: C.text, padding: '10px 12px', fontFamily: 'inherit', fontSize: 13, boxSizing: 'border-box', marginBottom: 12 }} />
          <div style={{ fontSize: 11, color: C.muted, marginBottom: 8, letterSpacing: 1 }}>ЕМОДЗІ</div>
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
            {EMOJIS.map(e => (
              <button key={e} onClick={() => setEmoji(e)} style={{ fontSize: 22, background: emoji === e ? '#2a2a4e' : 'none', border: `1px solid ${emoji === e ? C.orange : C.border}`, borderRadius: 8, padding: '4px 8px', cursor: 'pointer' }}>{e}</button>
            ))}
          </div>
        </div>
        <div style={{ fontSize: 11, color: C.muted, marginBottom: 10, letterSpacing: 1 }}>ВПРАВИ ({exercises.length})</div>
        {exercises.map((ex, i) => (
          <div key={ex.id} style={{ background: C.card, borderRadius: 12, padding: 12, marginBottom: 10, border: `1px solid ${C.border}` }}>
            <div style={{ display: 'flex', gap: 6, marginBottom: 8, alignItems: 'center' }}>
              <input value={ex.name} onChange={e => updateEx(i, 'name', e.target.value)} style={{ flex: 1, background: C.inner, border: `1px solid ${C.border}`, borderRadius: 8, color: C.text, padding: '8px 10px', fontFamily: 'inherit', fontSize: 13 }} />
              <button onClick={() => moveEx(i, -1)} style={{ background: 'none', border: `1px solid ${C.border}`, borderRadius: 6, color: C.muted, padding: '6px 9px', cursor: 'pointer', fontSize: 14 }}>↑</button>
              <button onClick={() => moveEx(i, 1)} style={{ background: 'none', border: `1px solid ${C.border}`, borderRadius: 6, color: C.muted, padding: '6px 9px', cursor: 'pointer', fontSize: 14 }}>↓</button>
              <button onClick={() => setExercises(exs => exs.filter((_, j) => j !== i))} style={{ background: '#2a1a1a', border: '1px solid #5a2a2a', borderRadius: 6, color: C.red, padding: '6px 9px', cursor: 'pointer', fontSize: 14 }}>✕</button>
            </div>
            <div style={{ display: 'flex', gap: 6 }}>
              {[['sets', 'Підходи', 'number'], ['reps', 'Повторення', 'text'], ['rest', 'Відпочинок', 'text']].map(([field, label, type]) => (
                <div key={field} style={{ flex: 1 }}>
                  <div style={{ fontSize: 9, color: C.muted, marginBottom: 4 }}>{label}</div>
                  <input value={ex[field]} type={type} inputMode={type === 'number' ? 'numeric' : 'text'}
                    onChange={e => updateEx(i, field, type === 'number' ? Number(e.target.value) : e.target.value)}
                    style={{ width: '100%', background: C.inner, border: `1px solid ${C.border}`, borderRadius: 6, color: C.text, padding: '6px 8px', fontFamily: 'inherit', fontSize: 16, boxSizing: 'border-box' }}
                  />
                </div>
              ))}
            </div>
          </div>
        ))}
        <button onClick={() => setExercises(exs => [...exs, { id: uid(), name: 'Нова вправа', sets: 3, reps: '10-12', rest: '60 сек' }])}
          style={{ width: '100%', padding: 12, background: C.card, border: '1px dashed #3a3a5a', borderRadius: 12, color: '#7a7a9a', fontFamily: 'inherit', fontSize: 13, cursor: 'pointer', marginBottom: 16 }}>
          ＋ Додати вправу
        </button>
        <button onClick={() => { onSave(planKey, { ...plan, name, emoji, exercises }); onClose(); }}
          style={{ width: '100%', padding: 14, background: `linear-gradient(135deg,${C.orange},${C.orangeL})`, border: 'none', borderRadius: 12, color: '#fff', fontFamily: 'inherit', fontSize: 15, fontWeight: 700, cursor: 'pointer' }}>
          💾 Зберегти зміни
        </button>
      </div>
    </div>
  );
}

// ─── DATA TRANSFER MODAL ──────────────────────────────────────────────────────
function DataTransferModal({ onClose }) {
  const [tab, setTab] = useState('export');
  const [importText, setImportText] = useState('');
  const [status, setStatus] = useState(null);
  const KEYS = ['wt_plan', 'wt_logs', 'wt_videos', 'wt_weightlog', 'wt_goals', 'wt_hints_log', 'wt_current'];

  const getExportData = () => {
    const data = {};
    KEYS.forEach(k => { const v = localStorage.getItem(k); if (v) data[k] = v; });
    return JSON.stringify(data);
  };

  const copyExport = () => {
    const ta = document.getElementById('wt-export-ta');
    if (!ta) return;
    ta.select();
    ta.setSelectionRange(0, 99999);
    try {
      const ok = document.execCommand('copy');
      setStatus(ok ? 'copied' : 'manual');
    } catch { setStatus('manual'); }
    setTimeout(() => setStatus(null), 3000);
  };

  const doImport = () => {
    try {
      const data = JSON.parse(importText);
      KEYS.forEach(k => { if (data[k]) localStorage.setItem(k, data[k]); });
      setStatus('imported');
    } catch { setStatus('error'); }
  };

  const doReset = () => {
    if (status === 'confirm') {
      KEYS.forEach(k => localStorage.removeItem(k));
      window.location.reload();
    } else {
      setStatus('confirm');
    }
  };

  return (
    <div style={{ position: 'fixed', inset: 0, zIndex: 300, background: 'rgba(0,0,0,0.9)', display: 'flex', alignItems: 'flex-end', justifyContent: 'center' }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{ background: '#13131f', border: `1px solid ${C.border}`, borderRadius: '20px 20px 0 0', width: '100%', maxWidth: 480, maxHeight: '85vh', display: 'flex', flexDirection: 'column' }}>
        <div style={{ padding: '20px 20px 0', flexShrink: 0 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14 }}>
            <div>
              <div style={{ fontSize: 11, color: C.muted, letterSpacing: 2 }}>ДАНІ ДОДАТКУ</div>
              <div style={{ fontSize: 15, fontWeight: 700, color: C.text, marginTop: 2 }}>⚙️ Управління даними</div>
            </div>
            <button onClick={onClose} style={{ background: 'none', border: 'none', color: C.muted, fontSize: 22, cursor: 'pointer' }}>✕</button>
          </div>
          <div style={{ display: 'flex', borderBottom: `1px solid ${C.border}`, marginBottom: 16 }}>
            {[['export', '📤 Експорт'], ['import', '📥 Імпорт'], ['reset', '🗑 Скинути']].map(([id, label]) => (
              <button key={id} onClick={() => { setTab(id); setStatus(null); }}
                style={{ flex: 1, padding: '8px 0', background: 'none', border: 'none', borderBottom: tab === id ? `2px solid ${id === 'reset' ? C.red : C.orange}` : '2px solid transparent', color: tab === id ? (id === 'reset' ? C.red : C.orange) : C.muted, fontFamily: 'inherit', fontSize: 11, cursor: 'pointer' }}>
                {label}
              </button>
            ))}
          </div>
        </div>
        <div style={{ overflowY: 'auto', padding: '0 20px 28px', flex: 1 }}>
          {tab === 'export' && (
            <div>
              <div style={{ fontSize: 12, color: C.muted, marginBottom: 10, lineHeight: 1.5 }}>Скопіюй текст і встав при імпорті в іншому браузері.</div>
              <textarea id="wt-export-ta" readOnly value={getExportData()}
                onFocus={e => { e.target.select(); e.target.setSelectionRange(0, 99999); }}
                style={{ width: '100%', height: 120, background: '#0d0d1a', border: `1px solid ${C.border}`, borderRadius: 8, color: C.orangeL, padding: 10, fontFamily: 'monospace', fontSize: 9, resize: 'none', boxSizing: 'border-box', WebkitUserSelect: 'text', userSelect: 'text' }}
              />
              <button onClick={copyExport}
                style={{ width: '100%', marginTop: 10, padding: 12, background: `linear-gradient(135deg,${C.orange},${C.orangeL})`, border: 'none', borderRadius: 10, color: '#fff', fontFamily: 'inherit', fontSize: 14, fontWeight: 700, cursor: 'pointer' }}>
                {status === 'copied' ? '✓ Скопійовано!' : status === 'manual' ? 'Виділи і Ctrl+C / Cmd+C' : '📋 Копіювати все'}
              </button>
            </div>
          )}
          {tab === 'import' && (
            <div>
              <div style={{ fontSize: 12, color: C.muted, marginBottom: 10, lineHeight: 1.5 }}>Встав сюди скопійований текст.</div>
              <textarea value={importText} onChange={e => { setImportText(e.target.value); setStatus(null); }} placeholder='{"wt_plan":...}'
                style={{ width: '100%', height: 120, background: '#0d0d1a', border: `1px solid ${C.border}`, borderRadius: 8, color: C.text, padding: 10, fontFamily: 'monospace', fontSize: 9, resize: 'none', boxSizing: 'border-box' }}
              />
              {status === 'imported' && <div style={{ margin: '8px 0', padding: '10px 12px', background: C.greenBg, borderRadius: 8, fontSize: 12, color: C.green }}>✓ Імпортовано! Перезавантаж сторінку.</div>}
              {status === 'error' && <div style={{ margin: '8px 0', padding: '10px 12px', background: C.redBg, borderRadius: 8, fontSize: 12, color: C.red }}>✗ Помилка — невірний формат</div>}
              <button onClick={doImport} disabled={!importText}
                style={{ width: '100%', marginTop: 8, padding: 12, background: importText ? `linear-gradient(135deg,${C.orange},${C.orangeL})` : '#1a1a2e', border: 'none', borderRadius: 10, color: importText ? '#fff' : C.dim, fontFamily: 'inherit', fontSize: 14, fontWeight: 700, cursor: importText ? 'pointer' : 'default' }}>
                💾 Імпортувати
              </button>
            </div>
          )}
          {tab === 'reset' && (
            <div>
              <div style={{ fontSize: 13, color: C.muted, marginBottom: 16, lineHeight: 1.6 }}>Видалить всі тренування, вагу, відео та налаштування. Скинеться до стандартного плану.</div>
              {status === 'confirm' && <div style={{ marginBottom: 12, padding: '12px 14px', background: C.redBg, border: `1px solid #7a2a2a`, borderRadius: 8, fontSize: 13, color: C.red, textAlign: 'center', fontWeight: 700 }}>⚠️ Це незворотньо! Натисни ще раз.</div>}
              <button onClick={doReset}
                style={{ width: '100%', padding: 14, background: status === 'confirm' ? '#5a1a1a' : '#2a1a1a', border: `1px solid ${status === 'confirm' ? '#cc3333' : '#5a2a2a'}`, borderRadius: 10, color: C.red, fontFamily: 'inherit', fontSize: 14, fontWeight: 700, cursor: 'pointer' }}>
                {status === 'confirm' ? '🗑 ТАК, СКИНУТИ ВСЕ' : '🗑 Скинути всі дані'}
              </button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── WORKOUT SESSION ──────────────────────────────────────────────────────────
function WorkoutSession({ plan, dayType, videos, logSet, onFinish, startTimer, onVideoClick, onClearSet, getLastSession, currentHints, onToggleHint, dayHints }) {
  const DH = dayHints || {};

  // Init local sets state from localStorage (crash recovery)
  const [sets, setSets] = useState(() => {
    const saved = ls.get('wt_current');
    if (saved && saved.date === todayKey() && saved.sets) return saved.sets;
    return {};
  });
  const setsRef = useRef({});
  setsRef.current = sets;

  const getSet = (exIdx, setIdx) => sets[`${exIdx}_${setIdx}`] || { weight: '', reps: '', done: false };

  const updateSet = (exIdx, setIdx, field, val) => {
    const key = `${exIdx}_${setIdx}`;
    const updated = { ...setsRef.current[key], [field]: val };
    const newSets = { ...setsRef.current, [key]: updated };
    setSets(newSets);
    // Save to localStorage immediately on every change (crash recovery)
    ls.set('wt_current', { sets: newSets, date: todayKey() });
    // Sync to App only on done toggle (for performance)
    if (field === 'done') logSet(exIdx, setIdx, updated);
  };

  const syncToApp = (exIdx, setIdx) => {
    const data = setsRef.current[`${exIdx}_${setIdx}`];
    if (data) logSet(exIdx, setIdx, data);
  };

  const totalSets = plan.exercises.reduce((s, e) => s + e.sets, 0);
  const doneSets = Object.values(sets).filter(s => s.done).length;

  // Build last session cache
  const lastSessions = {};
  plan.exercises.forEach(ex => { lastSessions[ex.id] = getLastSession(ex.id, dayType); });

  return (
    <div>
      {/* Progress */}
      <div style={{ marginBottom: 16 }}>
        <div style={{ fontSize: 18, fontWeight: 700, color: C.text }}>{plan.emoji} {plan.name}</div>
        <div style={{ marginTop: 8, background: C.card, borderRadius: 4, height: 4, overflow: 'hidden' }}>
          <div style={{ height: '100%', background: `linear-gradient(90deg,${C.orange},${C.orangeL})`, width: `${totalSets > 0 ? doneSets / totalSets * 100 : 0}%`, transition: 'width .3s' }} />
        </div>
        <div style={{ fontSize: 11, color: C.muted, marginTop: 4 }}>{doneSets} / {totalSets} підходів</div>
      </div>

      {/* Exercises */}
      {plan.exercises.map((ex, exIdx) => {
        const lastSession = lastSessions[ex.id] || null;
        const vHint = currentHints[ex.id] || DH[ex.id] || null;
        const firstFilled = Array.from({ length: ex.sets }, (_, i) => getSet(exIdx, i)).find(s => s.weight || s.reps);
        const allDone = Array.from({ length: ex.sets }, (_, i) => getSet(exIdx, i)).every(s => s.done);
        const hasVideo = !!videos[ex.id];
        const hintActive = currentHints[ex.id] || null;

        return (
          <div key={exIdx} style={{ background: C.card, borderRadius: 12, padding: 14, marginBottom: 12, border: `1px solid ${C.border}` }}>
            {/* Exercise header */}
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 700, fontSize: 14, color: C.text }}>{ex.name}</div>
                <div style={{ fontSize: 11, color: C.muted, marginTop: 1 }}>{ex.reps} повт · {ex.rest}</div>
              </div>
              {hasVideo ? (
                <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                  <a href={videos[ex.id]} target="_blank" rel="noreferrer" style={{ background: C.greenBg, border: `1px solid ${C.greenBorder}`, borderRadius: 8, padding: '5px 11px', color: C.green, fontSize: 12, textDecoration: 'none' }}>▶ відео</a>
                  <button onClick={() => onVideoClick(ex.id, ex.name)} style={{ background: 'none', border: 'none', color: '#3a3a5a', cursor: 'pointer', fontSize: 16, padding: 4 }}>✎</button>
                </div>
              ) : (
                <button onClick={() => onVideoClick(ex.id, ex.name)} style={{ background: C.card, border: '1px solid #3a3a5a', borderRadius: 8, padding: '5px 10px', cursor: 'pointer', color: C.muted, fontFamily: 'inherit', fontSize: 12 }}>＋ відео</button>
              )}
            </div>

            {/* Hint (standalone - no prev session) - only show if user set it THIS session */}
            {currentHints[ex.id] && !lastSession && (
              <div style={{ marginBottom: 8, padding: '5px 10px', background: currentHints[ex.id] === 'up' ? C.greenBg : C.redBg, borderRadius: 8, border: `1px solid ${currentHints[ex.id] === 'up' ? C.greenBorder : C.redBorder}` }}>
                <span style={{ fontSize: 11, fontWeight: 700, color: currentHints[ex.id] === 'up' ? C.green : C.red }}>{currentHints[ex.id] === 'up' ? '↑ більше' : '↓ менше'}</span>
              </div>
            )}

            {/* Last session */}
            {lastSession && (
              <div style={{ marginBottom: 8, padding: '8px 10px', background: C.inner, borderRadius: 8, border: `1px solid ${C.border}` }}>
                <div style={{ fontSize: 10, color: C.muted, fontWeight: 600, marginBottom: 4 }}>📅 Минулого разу · {lastSession.date}</div>
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 5, marginBottom: vHint ? 4 : 0 }}>
                  {lastSession.sets.map((s, i) => (
                    <span key={i} style={{ background: C.card, padding: '2px 7px', borderRadius: 6, fontSize: 12, color: '#c0c0d0', whiteSpace: 'nowrap' }}>{s.weight}кг×{s.reps}</span>
                  ))}
                </div>
                {vHint && (
                  <span style={{ display: 'inline-block', fontSize: 11, fontWeight: 700, padding: '3px 9px', borderRadius: 6, color: vHint === 'up' ? C.green : C.red, background: vHint === 'up' ? C.greenBg : C.redBg, border: `1px solid ${vHint === 'up' ? C.greenBorder : C.redBorder}` }}>
                    {vHint === 'up' ? '↑ більше' : '↓ менше'}
                  </span>
                )}
              </div>
            )}

            {/* Sets rows */}
            {Array.from({ length: ex.sets }, (_, setIdx) => {
              const setData = getSet(exIdx, setIdx);
              const hasData = setData.weight || setData.reps || setData.done;
              return (
                <div key={setIdx} style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '6px 0', borderBottom: setIdx < ex.sets - 1 ? `1px solid ${C.border}` : 'none', opacity: setData.done ? 0.65 : 1 }}>
                  <span style={{ fontSize: 11, color: C.muted, width: 18, flexShrink: 0 }}>{setIdx + 1}</span>
                  <input
                    placeholder="кг" value={setData.weight} inputMode="decimal" pattern="[0-9]*"
                    onChange={e => updateSet(exIdx, setIdx, 'weight', e.target.value)}
                    onFocus={e => e.target.select()}
                    onBlur={() => syncToApp(exIdx, setIdx)}
                    style={{ width: 52, background: C.inner, border: `1px solid ${C.border}`, borderRadius: 6, color: C.text, padding: '5px 4px', fontFamily: 'inherit', fontSize: 16, textAlign: 'center' }}
                  />
                  <input
                    placeholder="повт" value={setData.reps} inputMode="numeric" pattern="[0-9]*"
                    onChange={e => updateSet(exIdx, setIdx, 'reps', e.target.value)}
                    onFocus={e => e.target.select()}
                    onBlur={() => syncToApp(exIdx, setIdx)}
                    style={{ width: 52, background: C.inner, border: `1px solid ${C.border}`, borderRadius: 6, color: C.text, padding: '5px 4px', fontFamily: 'inherit', fontSize: 16, textAlign: 'center' }}
                  />
                  <button
                    onClick={() => { updateSet(exIdx, setIdx, 'done', !setData.done); if (!setData.done) startTimer(parseRestSec(ex.rest)); }}
                    style={{ flex: 1, padding: '6px 0', borderRadius: 6, border: 'none', cursor: 'pointer', background: setData.done ? C.greenBg : C.orange, color: setData.done ? C.green : '#fff', fontFamily: 'inherit', fontSize: 13, fontWeight: 700 }}>
                    {setData.done ? '✓ Зроблено' : 'Виконати'}
                  </button>
                  {hasData && (
                    <button onClick={() => { const key = `${exIdx}_${setIdx}`; setSets(s => { const n = { ...s }; delete n[key]; return n; }); onClearSet(exIdx, setIdx); }}
                      style={{ background: 'none', border: '1px solid #3a2a2a', borderRadius: 6, color: '#7a4a4a', padding: '5px 7px', cursor: 'pointer', fontSize: 12, flexShrink: 0 }}>✕</button>
                  )}
                </div>
              );
            })}

            {/* Quick actions (only for multi-set exercises) */}
            {ex.sets > 1 && (
              <div style={{ display: 'flex', gap: 6, marginTop: 8 }}>
                <button
                  onClick={() => {
                    const w = firstFilled?.weight || ''; const r = firstFilled?.reps || '';
                    const newSets = { ...setsRef.current };
                    for (let i = 0; i < ex.sets; i++) {
                      const k = `${exIdx}_${i}`;
                      if (!newSets[k]?.done) { newSets[k] = { ...newSets[k], weight: w, reps: r }; logSet(exIdx, i, newSets[k]); }
                    }
                    setSets(newSets); ls.set('wt_current', { sets: newSets, date: todayKey() });
                  }}
                  disabled={!firstFilled}
                  style={{ flex: 1, padding: '7px 4px', background: firstFilled ? C.card : '#111118', border: `1px solid ${firstFilled ? C.orangeL : C.border}`, borderRadius: 8, color: firstFilled ? C.orangeL : C.dim, fontFamily: 'inherit', fontSize: 11, cursor: firstFilled ? 'pointer' : 'default', textAlign: 'center', lineHeight: 1.3 }}>
                  ⚡{'\n'}Заповнити
                </button>
                <button
                  onClick={() => {
                    const newSets = { ...setsRef.current };
                    for (let i = 0; i < ex.sets; i++) {
                      const k = `${exIdx}_${i}`;
                      newSets[k] = { ...newSets[k], done: !allDone };
                      logSet(exIdx, i, newSets[k]);
                    }
                    setSets(newSets); ls.set('wt_current', { sets: newSets, date: todayKey() });
                    if (!allDone) startTimer(parseRestSec(ex.rest));
                  }}
                  style={{ flex: 1, padding: '7px 4px', background: allDone ? C.greenBg : '#1a2e1a', border: `1px solid ${allDone ? C.greenBorder : '#2a4a2a'}`, borderRadius: 8, color: allDone ? C.green : '#7acf7a', fontFamily: 'inherit', fontSize: 11, cursor: 'pointer', textAlign: 'center', lineHeight: 1.3 }}>
                  {allDone ? '✓✓\nСкасувати' : '✓\nВсі готові'}
                </button>
                <button onClick={() => onToggleHint(ex.id, 'up')}
                  style={{ flex: 1, padding: '7px 4px', background: hintActive === 'up' ? C.greenBg : C.card, border: `1px solid ${hintActive === 'up' ? C.greenBorder : C.border}`, borderRadius: 8, color: hintActive === 'up' ? C.green : C.muted, fontFamily: 'inherit', fontSize: 18, fontWeight: 700, cursor: 'pointer', textAlign: 'center', lineHeight: 1.3 }}>
                  {hintActive === 'up' ? '＋\n✓ більше' : '＋\nбільше'}
                </button>
                <button onClick={() => onToggleHint(ex.id, 'down')}
                  style={{ flex: 1, padding: '7px 4px', background: hintActive === 'down' ? C.redBg : C.card, border: `1px solid ${hintActive === 'down' ? C.redBorder : C.border}`, borderRadius: 8, color: hintActive === 'down' ? C.red : C.muted, fontFamily: 'inherit', fontSize: 18, fontWeight: 700, cursor: 'pointer', textAlign: 'center', lineHeight: 1.3 }}>
                  {hintActive === 'down' ? '－\n✓ менше' : '－\nменше'}
                </button>
              </div>
            )}
          </div>
        );
      })}

      <button onClick={onFinish}
        style={{ width: '100%', padding: 16, background: `linear-gradient(135deg,${C.orange},${C.orangeL})`, border: 'none', borderRadius: 12, color: '#fff', fontFamily: 'inherit', fontSize: 15, fontWeight: 700, cursor: 'pointer', marginTop: 8 }}>
        🏁 Завершити тренування
      </button>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [plan, setPlan] = useState(() => ls.get('wt_plan') || DEFAULT_PLAN);
  const [logs, setLogs] = useState(() => ls.get('wt_logs') || {});
  const [videos, setVideos] = useState(() => ls.get('wt_videos') || {});
  const [weightLog, setWeightLog] = useState(() => ls.get('wt_weightlog') || {});
  const [currentHints, setCurrentHints] = useState({});
  const [currentSets, setCurrentSets] = useState({});
  const [tab, setTab] = useState('today');
  const [timerSec, setTimerSec] = useState(0);
  const [timerRunning, setTimerRunning] = useState(false);
  const [timerEnd, setTimerEnd] = useState(null);
  const [videoModal, setVideoModal] = useState(null);
  const [editModal, setEditModal] = useState(null);
  const [confirmModal, setConfirmModal] = useState(null);
  const [dateOverride, setDateOverride] = useState(null);
  const [showWeightModal, setShowWeightModal] = useState(false);
  const [showTransfer, setShowTransfer] = useState(false);
  const [goals, setGoals] = useState(() => ls.get('wt_goals') || { start: 99, goal: 85 });
  const [showGoalEdit, setShowGoalEdit] = useState(false);
  const [selDay, setSelDay] = useState(() => {
    const saved = ls.get('wt_current');
    if (saved && saved.date === todayKey() && saved.day) return saved.day;
    return null;
  });
  const [hintsLog, setHintsLog] = useState(() => {
    // Load from localStorage, migrate from old logs format
    const stored = ls.get('wt_hints_log') || {};
    const oldLogs = ls.get('wt_logs') || {};
    const merged = { ...stored };
    Object.values(oldLogs).forEach(l => {
      if (l.hints && l.dayType && Object.keys(l.hints).length > 0) {
        merged[l.dayType] = Object.assign({}, l.hints, merged[l.dayType] || {});
      }
    });
    return merged;
  });

  // Persist to localStorage
  useEffect(() => { ls.set('wt_plan', plan); }, [plan]);
  useEffect(() => { ls.set('wt_logs', logs); }, [logs]);
  useEffect(() => { ls.set('wt_videos', videos); }, [videos]);
  useEffect(() => { ls.set('wt_weightlog', weightLog); }, [weightLog]);
  useEffect(() => { ls.set('wt_goals', goals); }, [goals]);
  useEffect(() => { ls.set('wt_hints_log', hintsLog); }, [hintsLog]);

  // Timer - uses absolute end time so backgrounding doesn't break it
  useEffect(() => {
    const onVis = () => {
      if (document.visibilityState === 'visible' && timerEnd) {
        const remaining = Math.ceil((timerEnd - Date.now()) / 1000);
        if (remaining <= 0) { setTimerSec(0); setTimerRunning(false); setTimerEnd(null); }
        else setTimerSec(remaining);
      }
    };
    document.addEventListener('visibilitychange', onVis);
    return () => document.removeEventListener('visibilitychange', onVis);
  }, [timerEnd]);

  useEffect(() => {
    let interval;
    if (timerRunning && timerEnd) {
      interval = setInterval(() => {
        const remaining = Math.ceil((timerEnd - Date.now()) / 1000);
        if (remaining <= 0) { setTimerSec(0); setTimerRunning(false); setTimerEnd(null); }
        else setTimerSec(remaining);
      }, 500);
    }
    return () => clearInterval(interval);
  }, [timerRunning, timerEnd]);

  const today = todayKey();
  const dayOfWeek = new Date().getDay();
  const weekIdx = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
  const autoDay = WEEK_SCHEDULE[weekIdx];
  const effectiveDay = selDay || autoDay;
  const sessionDate = dateOverride || today;
  const todayWeight = weightLog[today];
  const latestWeight = todayWeight || Object.entries(weightLog).sort(([a], [b]) => b.localeCompare(a))[0]?.[1] || '—';
  const weightRecorded = !!weightLog[today];
  const todayLog = logs[today];

  const getLastSession = (exId, dayType) => {
    const sortedDates = Object.keys(logs).sort((a, b) => b.localeCompare(a));
    for (const date of sortedDates) {
      const log = logs[date];
      if (log.dayType === dayType) {
        const exIdx = (plan[dayType]?.exercises || []).findIndex(e => e.id === exId);
        if (exIdx !== -1) {
          const doneSets = (log.sets?.[exIdx] || []).filter(s => s.done && s.weight);
          if (doneSets.length > 0) {
            return { date, sets: doneSets, hint: (hintsLog[dayType] || {})[exId] || null };
          }
        }
      }
    }
    return null;
  };

  const handleFinish = () => {
    const dayType = effectiveDay;
    // Read from localStorage (always up to date) OR fall back to App state
    const savedSession = ls.get('wt_current');
    const sourceSets = (savedSession && savedSession.date === todayKey() && savedSession.sets)
      ? savedSession.sets
      : currentSets;
    const setsData = {};
    (plan[dayType]?.exercises || []).forEach((ex, i) => {
      setsData[i] = Array.from({ length: ex.sets }, (_, j) => sourceSets[`${i}_${j}`] || { weight: '', reps: '', done: false });
    });
    const logKey = sessionDate + (logs[sessionDate] && logs[sessionDate].dayType !== dayType ? '_' + dayType : '');
    setLogs(l => ({ ...l, [logKey]: { dayType, sets: setsData, hints: currentHints, timestamp: Date.now() } }));
    setCurrentHints({});
    setCurrentSets({});
    ls.del('wt_current');
    setSelDay(null);
    setTab('history');
  };

  const handleToggleHint = (exId, val) => {
    setHintsLog(hl => {
      const cur = (hl[effectiveDay] || {})[exId];
      const nv = cur === val ? null : val;
      const nd = { ...hl[effectiveDay] || {} };
      if (nv === null) delete nd[exId]; else nd[exId] = nv;
      return { ...hl, [effectiveDay]: nd };
    });
    setCurrentHints(h => ({ ...h, [exId]: h[exId] === val ? null : val }));
  };

  const handleDeleteLog = (key) => {
    const deletedLog = logs[key];
    if (deletedLog) {
      const dayType = deletedLog.dayType;
      const hasOther = Object.keys(logs).some(k => k !== key && logs[k].dayType === dayType);
      if (!hasOther) {
        setHintsLog(hl => { const n = { ...hl }; delete n[dayType]; return n; });
      }
    }
    setLogs(l => { const n = { ...l }; delete n[key]; return n; });
  };

  return (
    <div style={{ minHeight: '100vh', background: C.bg, color: C.text, fontFamily: "'Courier New',monospace", paddingBottom: 80 }}>

      {/* Modals */}
      {videoModal && <VideoModal exId={videoModal.exId} exName={videoModal.exName} videos={videos} onSave={(id, url) => setVideos(v => { const n = { ...v }; if (url) n[id] = url; else delete n[id]; return n; })} onClose={() => setVideoModal(null)} />}
      {editModal && <EditPlanModal planKey={editModal} plan={plan[editModal]} onSave={(key, p) => setPlan(pl => ({ ...pl, [key]: p }))} onClose={() => setEditModal(null)} />}
      {showWeightModal && <WeightLogModal weightLog={weightLog} todayK={today} onSave={(d, v) => setWeightLog(wl => ({ ...wl, [d]: v }))} onClose={() => setShowWeightModal(false)} />}
      {showTransfer && <DataTransferModal onClose={() => setShowTransfer(false)} />}
      {confirmModal && (
        <Confirm
          msg={confirmModal.type === 'log' ? 'Видалити це тренування?' : 'Очистити підхід?'}
          onYes={() => {
            if (confirmModal.type === 'log') handleDeleteLog(confirmModal.key);
            if (confirmModal.type === 'set') {
              setCurrentSets(s => { const n = { ...s }; delete n[`${confirmModal.exIdx}_${confirmModal.setIdx}`]; return n; });
            }
            setConfirmModal(null);
          }}
          onNo={() => setConfirmModal(null)}
        />
      )}

      {/* Header */}
      <div style={{ background: 'linear-gradient(135deg,#1a1a2e,#16213e)', borderBottom: `1px solid ${C.border}`, padding: '16px 20px 14px', position: 'sticky', top: 0, zIndex: 10 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div>
            <div style={{ fontSize: 11, color: C.muted, letterSpacing: 3, textTransform: 'uppercase' }}>Fitness Tracker {VERSION}</div>
            <div style={{ fontSize: 20, fontWeight: 700, letterSpacing: -1, color: C.text }}>
              Ціль: <span onClick={() => setShowGoalEdit(g => !g)} style={{ color: C.orange, cursor: 'pointer', borderBottom: `1px dashed ${C.orange}` }}>{goals.goal} кг ✏️</span>
            </div>
          </div>
          <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
            <button onClick={showDebug} style={{ background: 'none', border: '1px solid #ff6b35', borderRadius: 10, padding: '8px 10px', cursor: 'pointer', fontSize: 10, color: '#ff6b35' }}>
              🔍
            </button>
            <button onClick={() => setShowTransfer(true)} style={{ background: 'none', border: `1px solid ${C.border}`, borderRadius: 10, padding: '8px 10px', cursor: 'pointer' }}>
              <span style={{ fontSize: 18 }}>⇄</span>
            </button>
            <button onClick={() => setShowWeightModal(true)} style={{ background: weightRecorded ? C.greenBg : C.card, border: `1px solid ${weightRecorded ? C.greenBorder : C.orange}`, borderRadius: 10, padding: '8px 12px', cursor: 'pointer', textAlign: 'right' }}>
              <div style={{ fontSize: 10, color: weightRecorded ? C.green : C.muted, marginBottom: 2 }}>{weightRecorded ? '✓ Записано' : '📊 Вага сьогодні'}</div>
              <div style={{ fontSize: 22, fontWeight: 700, color: weightRecorded ? C.green : C.orange, letterSpacing: -1 }}>{latestWeight} <span style={{ fontSize: 13, color: C.muted }}>кг</span></div>
            </button>
          </div>
        </div>

        {/* Progress bar */}
        <div style={{ marginTop: 10 }}>
          <div style={{ background: '#2a2a3e', borderRadius: 4, height: 5, overflow: 'hidden' }}>
            <div style={{ height: '100%', borderRadius: 4, background: `linear-gradient(90deg,${C.orange},${C.orangeL})`, width: `${latestWeight !== '—' ? Math.max(0, Math.min(100, (goals.start - parseFloat(latestWeight)) / (goals.start - goals.goal) * 100)) : 0}%`, transition: 'width .5s' }} />
          </div>
          <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 10, color: C.muted, marginTop: 3 }}>
            <span>Старт: {goals.start} кг</span>
            {latestWeight !== '—' && <span style={{ color: C.orangeL }}>-{(goals.start - parseFloat(latestWeight)).toFixed(1)} кг</span>}
            <span>Ціль: {goals.goal} кг</span>
          </div>
        </div>

        {/* Goal edit panel */}
        {showGoalEdit && (
          <div style={{ marginTop: 10, background: '#13131f', borderRadius: 10, padding: 14, border: `1px solid ${C.border}` }}>
            <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 10, color: C.muted, marginBottom: 4 }}>СТАРТ</div>
                <input type="number" value={goals.start} onChange={e => setGoals(g => ({ ...g, start: Number(e.target.value) }))} style={{ width: '100%', background: C.card, border: `1px solid ${C.border}`, borderRadius: 8, color: C.text, padding: 8, fontFamily: 'inherit', fontSize: 16, textAlign: 'center' }} />
              </div>
              <div style={{ fontSize: 18, color: C.muted }}>→</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 10, color: C.muted, marginBottom: 4 }}>ЦІЛЬ</div>
                <input type="number" value={goals.goal} onChange={e => setGoals(g => ({ ...g, goal: Number(e.target.value) }))} style={{ width: '100%', background: C.card, border: `1px solid ${C.orange}`, borderRadius: 8, color: C.orange, padding: 8, fontFamily: 'inherit', fontSize: 16, textAlign: 'center', fontWeight: 700 }} />
              </div>
            </div>
            <button onClick={() => setShowGoalEdit(false)} style={{ width: '100%', marginTop: 10, padding: 10, background: `linear-gradient(135deg,${C.orange},${C.orangeL})`, border: 'none', borderRadius: 8, color: '#fff', fontFamily: 'inherit', fontSize: 13, fontWeight: 700, cursor: 'pointer' }}>✓ Готово</button>
          </div>
        )}

        {/* Timer */}
        {timerSec > 0 && (
          <div style={{ marginTop: 10, background: timerRunning ? '#1a2e1a' : '#2e1a1a', border: `1px solid ${timerRunning ? C.greenBorder : C.redBorder}`, borderRadius: 8, padding: '8px 12px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <span style={{ fontSize: 12, color: '#7a9a7a' }}>⏱ Відпочинок</span>
            <span style={{ fontSize: 24, fontWeight: 700, color: timerRunning ? '#4aff4a' : '#ff4a4a', letterSpacing: 2 }}>{Math.floor(timerSec / 60)}:{String(timerSec % 60).padStart(2, '0')}</span>
            <button onClick={() => { setTimerRunning(false); setTimerSec(0); setTimerEnd(null); }} style={{ background: 'none', border: 'none', color: C.muted, cursor: 'pointer', fontSize: 16 }}>✕</button>
          </div>
        )}
      </div>

      {/* Tabs */}
      <div style={{ display: 'flex', borderBottom: `1px solid ${C.border}`, background: '#0d0d1a' }}>
        {[['today', 'Сьогодні'], ['plan', 'План'], ['history', 'Історія']].map(([id, label]) => (
          <button key={id} onClick={() => setTab(id)} style={{ flex: 1, padding: '12px 0', background: 'none', border: 'none', borderBottom: tab === id ? `2px solid ${C.orange}` : '2px solid transparent', color: tab === id ? C.orange : C.muted, fontFamily: 'inherit', fontSize: 12, cursor: 'pointer', letterSpacing: 1, textTransform: 'uppercase' }}>{label}</button>
        ))}
      </div>

      {/* Content */}
      <div style={{ padding: 16 }}>

        {/* TODAY TAB */}
        {tab === 'today' && (
          <div>
            {/* Day selector */}
            <div style={{ marginBottom: 16 }}>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
                <div style={{ fontSize: 11, color: C.muted, letterSpacing: 2, textTransform: 'uppercase' }}>Тренування</div>
                <button onClick={() => setSelDay(null)} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 11, color: selDay ? C.orange : C.muted, padding: '2px 6px', borderRadius: 6, border: `1px solid ${selDay ? C.orange : 'transparent'}` }}>
                  {selDay ? `✕ авто (${autoDay})` : ` авто: ${autoDay}`}
                </button>
              </div>
              <div style={{ display: 'flex', gap: 6 }}>
                {Object.keys(plan).map(dk => {
                  const isActive = effectiveDay === dk;
                  const isAuto = autoDay === dk && !selDay;
                  return (
                    <button key={dk} onClick={() => setSelDay(selDay === dk ? null : dk)}
                      style={{ flex: 1, padding: '10px 4px', background: isActive ? `linear-gradient(135deg,${C.orange},${C.orangeL})` : C.card, border: `1px solid ${isActive ? C.orange : isAuto ? '#3a3a5e' : C.border}`, borderRadius: 10, color: isActive ? '#fff' : isAuto ? C.text : C.muted, fontFamily: 'inherit', cursor: 'pointer', textAlign: 'center' }}>
                      <div style={{ fontSize: 16 }}>{plan[dk].emoji}</div>
                      <div style={{ fontSize: 10, marginTop: 2 }}>{dk}</div>
                    </button>
                  );
                })}
              </div>
            </div>

            {/* Workout completed today */}
            {todayLog && !selDay ? (
              <div style={{ textAlign: 'center', padding: '40px 20px' }}>
                <div style={{ fontSize: 48 }}>✅</div>
                <div style={{ fontSize: 18, fontWeight: 700, marginTop: 12, color: C.text }}>Тренування виконано!</div>
                <div style={{ color: C.muted, marginTop: 8 }}>{plan[todayLog.dayType]?.name}</div>
                <button onClick={() => setConfirmModal({ type: 'log', key: today })} style={{ marginTop: 20, padding: '10px 24px', background: '#2a1a1a', border: '1px solid #5a2a2a', borderRadius: 10, color: C.red, fontFamily: 'inherit', cursor: 'pointer', fontSize: 13 }}>🗑 Видалити і зробити заново</button>
              </div>
            ) : effectiveDay === 'rest' ? (
              <div style={{ textAlign: 'center', padding: '40px 20px' }}>
                <div style={{ fontSize: 48 }}>😴</div>
                <div style={{ fontSize: 18, fontWeight: 700, marginTop: 12, color: C.text }}>День відпочинку</div>
                <div style={{ color: C.muted, marginTop: 8 }}>М'язи ростуть під час відпочинку 💪</div>
                <div style={{ marginTop: 20, display: 'flex', gap: 8, justifyContent: 'center', flexWrap: 'wrap' }}>
                  {Object.keys(plan).map(dk => (
                    <button key={dk} onClick={() => { setSelDay(dk); setTab('today'); }} style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 8, padding: '8px 14px', color: C.text, fontFamily: 'inherit', cursor: 'pointer', fontSize: 12 }}>{plan[dk].emoji} {dk}</button>
                  ))}
                </div>
              </div>
            ) : (
              <WorkoutSession
                plan={plan[effectiveDay]}
                dayType={effectiveDay}
                videos={videos}
                logSet={(exIdx, setIdx, data) => setCurrentSets(s => ({ ...s, [`${exIdx}_${setIdx}`]: data }))}
                onFinish={handleFinish}
                startTimer={(sec) => { const end = Date.now() + sec * 1000; setTimerEnd(end); setTimerSec(sec); setTimerRunning(true); }}
                onVideoClick={(id, name) => setVideoModal({ exId: id, exName: name })}
                onClearSet={(exIdx, setIdx) => setConfirmModal({ type: 'set', exIdx, setIdx })}
                getLastSession={getLastSession}
                currentHints={currentHints}
                onToggleHint={handleToggleHint}
                dayHints={hintsLog[effectiveDay] || {}}
              />
            )}
          </div>
        )}

        {/* PLAN TAB */}
        {tab === 'plan' && (
          <div>
            <div style={{ fontSize: 11, color: C.muted, letterSpacing: 2, textTransform: 'uppercase', marginBottom: 16 }}>Тижневий розклад</div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7,1fr)', gap: 6, marginBottom: 24 }}>
              {WEEK_SCHEDULE.map((day, i) => (
                <div key={i} style={{ background: i === weekIdx ? '#1e2a1e' : C.card, border: `1px solid ${i === weekIdx ? '#2a5a2a' : C.border}`, borderRadius: 8, padding: '8px 4px', textAlign: 'center' }}>
                  <div style={{ fontSize: 10, color: C.muted }}>{DAY_NAMES[i]}</div>
                  <div style={{ fontSize: 16, marginTop: 4 }}>{day === 'rest' ? '😴' : plan[day]?.emoji}</div>
                  <div style={{ fontSize: 10, color: day === 'rest' ? C.muted : C.orangeL, marginTop: 2 }}>{day === 'rest' ? '—' : day}</div>
                </div>
              ))}
            </div>
            {Object.entries(plan).map(([key, p]) => (
              <div key={key} style={{ background: C.card, borderRadius: 12, padding: 16, marginBottom: 12, border: `1px solid ${C.border}` }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
                  <div style={{ fontWeight: 700, fontSize: 15, color: C.text }}>{p.emoji} {p.name}</div>
                  <button onClick={() => setEditModal(key)} style={{ background: C.card, border: '1px solid #3a3a5a', borderRadius: 8, padding: '5px 12px', color: '#a0a0c0', fontFamily: 'inherit', fontSize: 12, cursor: 'pointer' }}>✏️ Змінити</button>
                </div>
                {p.exercises.map((ex, i) => (
                  <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '7px 0', borderBottom: i < p.exercises.length - 1 ? `1px solid ${C.border}` : 'none' }}>
                    <span style={{ flex: 1, fontSize: 13, color: C.text }}>{ex.name}</span>
                    <span style={{ fontSize: 11, color: C.muted }}>{ex.sets}×{ex.reps}</span>
                    {videos[ex.id] && <a href={videos[ex.id]} target="_blank" rel="noreferrer" style={{ background: C.greenBg, border: `1px solid ${C.greenBorder}`, borderRadius: 7, padding: '4px 9px', color: C.green, fontSize: 12, textDecoration: 'none' }}>▶</a>}
                    <button onClick={() => setVideoModal({ exId: ex.id, exName: ex.name })} style={{ background: 'none', border: `1px solid ${videos[ex.id] ? 'transparent' : '#3a3a5a'}`, borderRadius: 7, padding: '4px 8px', cursor: 'pointer', color: videos[ex.id] ? '#3a3a5a' : C.muted, fontSize: 12 }}>{videos[ex.id] ? '✎' : '＋'}</button>
                  </div>
                ))}
              </div>
            ))}
          </div>
        )}

        {/* HISTORY TAB */}
        {tab === 'history' && (
          <div>
            <div style={{ fontSize: 11, color: C.muted, letterSpacing: 2, textTransform: 'uppercase', marginBottom: 16 }}>Історія тренувань</div>
            {Object.keys(logs).length === 0 ? (
              <div style={{ textAlign: 'center', color: C.muted, padding: 40 }}>Ще немає записів</div>
            ) : (
              Object.keys(logs).sort((a, b) => b.localeCompare(a)).map(date => {
                const log = logs[date];
                const p = plan[log.dayType];
                return (
                  <div key={date} style={{ background: C.card, borderRadius: 12, padding: 16, marginBottom: 12, border: `1px solid ${C.border}` }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 10 }}>
                      <div>
                        <div style={{ fontSize: 13, fontWeight: 700, color: C.text }}>{p?.emoji} {p?.name}</div>
                        <div style={{ fontSize: 11, color: C.muted, marginTop: 2 }}>
                          {date}
                          {weightLog[date] && <span style={{ color: C.orangeL, marginLeft: 8 }}>⚖️ {weightLog[date]} кг</span>}
                        </div>
                      </div>
                      <button onClick={() => setConfirmModal({ type: 'log', key: date })} style={{ background: '#2a1a1a', border: '1px solid #5a2a2a', borderRadius: 8, padding: '5px 10px', color: C.red, fontFamily: 'inherit', fontSize: 12, cursor: 'pointer' }}>🗑</button>
                    </div>
                    {p?.exercises.map((ex, i) => {
                      const doneSets = (log.sets?.[i] || []).filter(s => s.weight || s.reps || s.done);
                      const hint = log.hints?.[ex.id] || null;
                      if (doneSets.length === 0 && !hint) return null;
                      return (
                        <div key={i} style={{ fontSize: 12, padding: '4px 0', display: 'flex', alignItems: 'center', gap: 6, borderBottom: `1px solid ${C.border}` }}>
                          <span style={{ color: '#a0a0b0', flex: 1 }}>{ex.name}</span>
                          <span style={{ color: C.orangeL }}>{doneSets.map(s => `${s.weight}кг×${s.reps}`).join(', ')}</span>
                          {hint && <span style={{ fontSize: 10, fontWeight: 700, padding: '1px 6px', borderRadius: 5, color: hint === 'up' ? C.green : C.red, background: hint === 'up' ? C.greenBg : C.redBg, border: `1px solid ${hint === 'up' ? C.greenBorder : C.redBorder}` }}>{hint === 'up' ? '↑' : '↓'}</span>}
                        </div>
                      );
                    })}
                  </div>
                );
              })
            )}
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
